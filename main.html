<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSS Modal</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f4f4;
    }

    /* Open Button */
    #openModal{
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      background-color: #007bff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    /* Modal Background */
    .modal{
      display: none;
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
    }

    /* Modal Box */
    .modal-content{
      background: white;
      width: 400px;
      border-radius: 8px;
      overflow: hidden;
      animation: popup 0.3s ease;
    }

    /* Header */
    .modal-header{
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background-color: #007bff;
      color: white;
    }

    /* Close Button */
    .close-modal{
      background: none;
      border: none;
      font-size: 22px;
      color: white;
      cursor: pointer;
    }

    /* Body */
    .modal-body{
      padding: 20px;
      font-size: 16px;
    }

    /* Animation */
    @keyframes popup{
      from{
        transform: scale(0.7);
        opacity: 0;
      }
      to{
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <!-- Open Button -->
  <button id="openModal">Open Modal</button>

  <!-- Modal -->
  <div class="modal" id="modal">

    <div class="modal-content">

      <div class="modal-header">
        <h2>Modal Header</h2>
        <button class="close-modal">&times;</button>
      </div>

      <div class="modal-body">
        <p>Modal Body Content</p>
      </div>

    </div>

  </div>

  <script>
    const openBtn = document.getElementById("openModal");
    const modal = document.getElementById("modal");
    const closeBtn = document.querySelector(".close-modal");

    // Open Modal
    openBtn.onclick = function () {
      modal.style.display = "flex";
    };

    // Close Modal Button
    closeBtn.onclick = function () {
      modal.style.display = "none";
    };

    // Close When Click Outside
    window.onclick = function (e) {
      if (e.target === modal) {
        modal.style.display = "none";
      }
    };
  </script>

</body>
</html>
